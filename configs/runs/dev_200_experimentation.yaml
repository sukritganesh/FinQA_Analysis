data:
  input_path: data/processed/dev_200.json
  offset: 0
  limit: 200

retrieval:
  strategy: bm25
  mode: combined
  top_k: 6
  # top_k_text: 3
  # top_k_table: 3

prompt:
  prompt_dir: configs/prompts/finqa_prompt_refinement

model:
  model: gemma-4-e2b-it
  base_url: http://127.0.0.1:8000/v1
  max_tokens: 256
  temperature: 0.0
  timeout_seconds: 60.0

outputs:
  run_name: dev_200_gemma-4-e2b-it
  prediction_path: reports/test_results/model_compare/gemma-4-e2b-it/predictions.json
  evaluation_dir: reports/test_results/model_compare/gemma-4-e2b-it
  evaluate: true

runtime:
  continue_on_error: true
