data:
  input_path: data/processed/train_100.json
  offset: 0
  limit: 100

retrieval:
  strategy: bm25
  mode: combined
  top_k: 5

prompt:
  prompt_dir: configs/prompts/finqa_prompt_B_compact

model:
  model: qwen3b
  base_url: http://127.0.0.1:8000/v1
  max_tokens: 256
  temperature: 0.0
  timeout_seconds: 60.0

outputs:
  run_name: testA
  prediction_path: reports/test_results/testA/predictions.json
  evaluation_dir: reports/test_results/testA
  evaluate: true

runtime:
  continue_on_error: true
