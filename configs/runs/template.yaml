# End-to-end FinQA pipeline run over a deterministic random train sample.
#
# Sample source:
#   data/processed/train_100.json
#
# Before running, manually serve the model with vLLM, for example:
#   source .finqa-vllm-env/bin/activate
#   vllm serve Qwen/Qwen2.5-14B-Instruct-AWQ --max-model-len 4096
#
# Run from the repository root:
#   .venv/bin/python scripts/run_pipeline.py configs/runs/train_100_qwen14b_awq.yaml

data:
  input_path: data/raw/train.json
  offset: 0
  # limit: 1000

retrieval:
  strategy: bm25
  mode: by_source
  # top_k: 6
  top_k_text: 3
  top_k_table: 3

prompt:
  prompt_dir: configs/prompts/finqa_prompt_A

model:
  model: qwen14b-awq
  base_url: http://127.0.0.1:8000/v1
  max_tokens: 256
  temperature: 0.0
  timeout_seconds: 60.0

outputs:
  run_name: train_all_qwen14b_awq_A
  prediction_path: reports/test_results/train_all_qwen14b_awq_A/predictions.json
  evaluation_dir: reports/test_results/train_all_qwen14b_awq_A
  evaluate: true

runtime:
  continue_on_error: true
